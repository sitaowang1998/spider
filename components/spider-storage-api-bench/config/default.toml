[server]
rest_bind = "10.1.0.3:8091"
grpc_bind = "10.1.0.3:50051"
rest_target = "http://10.1.0.3:8091"
grpc_target = "http://10.1.0.3:50051"

[database]
host = "127.0.0.1"
port = 3306
name = "spider-db"
username = "spider-user"
password = "spider-password"
max_connections = 32
ssl_mode = "preferred"

[benchmark]
task_count = 1000
job_count = 10
payload_bytes = 128
client_count = 8
worker_count = 16
poll_batch = 64
poll_wait_ms = 10
warmup_sec = 5
duration_sec = 30
flat_percent = 80
output_dir = "data/"

[distributed]
agent_timeout_sec = 1800
poll_interval_ms = 1000

[distributed.submitter]
id = "submitter-10-1-0-7"
url = "http://10.1.0.7:19091"

[[distributed.workers]]
id = "worker-10-1-0-8"
url = "http://10.1.0.8:19091"
