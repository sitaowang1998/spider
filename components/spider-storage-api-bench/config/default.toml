[server]
rest_bind = "127.0.0.1:8080"
grpc_bind = "127.0.0.1:50051"
rest_target = "http://127.0.0.1:8080"
grpc_target = "http://127.0.0.1:50051"

[database]
host = "127.0.0.1"
port = 3306
name = "spider-db"
username = "spider-user"
password = "spider-password"
max_connections = 32

[benchmark]
task_count = 1000
job_count = 10
payload_bytes = 128
client_count = 4
worker_count = 8
poll_batch = 64
poll_wait_ms = 10
warmup_sec = 5
duration_sec = 30
flat_percent = 80
output_dir = "build/storage-api-bench"
