[aws]
region = "us-east-1"
availability_zone = "us-east-1a"
run_id = "spider-storage-bench-128"
# Set for LocalStack tests, for example "http://localhost:4566".
endpoint_url = ""

[benchmark]
node_counts = [1, 2, 4, 8, 16, 32, 64]
protocols = ["grpc", "rest"]
workloads = ["flat"]
jobs_per_worker = 10
tasks_per_job = 1000
payload_bytes = 1024
task_sleep_ms = 3
submitter_count = 8
worker_count = 16
flat_percent = 50
worker_poll_wait_ms = 1
job_poll_wait_ms = 10
scheduler_poll_batch = 1024
scheduler_refill_interval_ms = 10
scheduler_poll_wait_ms = 10

[instances]
worker_count = 64
worker_type = "c7i.xlarge"
submitter_type = "c7i.xlarge"
scheduler_type = "c7i.48xlarge"
server_type = "r7i.48xlarge"
controller_type = "c7i.large"
# Optional override for the benchmark-node AMI. Leave as ami-xxxxxxxx to use
# .aws-bench/ami/latest.json written by build_ami.py.
ami_id = ""
key_name = ""
iam_instance_profile = "spider-storage-bench-ssm"
remote_root = "/opt/spider"
remote_workspace_root = "/var/lib/spider-bench"

[database]
name = "spider_db"
username = "spider_user"
password = "spider-storage-pwd"
port = 3306
instance_class = "db.r7i.48xlarge"
allocated_storage = 400
storage_type = "gp3"
max_connections = 256
ssl_mode = "preferred"

[network]
vpc_id = ""
vpc_cidr = "10.42.0.0/16"
subnet_id = ""
subnet_cidr = "10.42.1.0/24"
worker_subnet_ids = []
rds_subnet_ids = ["", ""]
rds_subnet_cidrs = ["10.42.1.0/24", "10.42.2.0/24"]
rds_subnet_availability_zones = ["us-east-1a", "us-east-1b", "us-east-1c", "us-east-1d"]
security_group_id = ""
rds_security_group_id = ""
placement_group = ""
placement_strategy = ""

[artifact]
mode = "existing-repo"
# Optional exact S3 destination for the source bundle uploaded by build_ami.py.
s3_uri = ""
# Source OS AMI used only by build_ami.py. Amazon Linux 2023 with SSM agent is recommended.
base_ami_id = "ami-0236922087fa98b6e"
builder_instance_type = "c7i.large"
builder_iam_instance_profile = "spider-bench-ami-builder"
# Human-readable AWS image name prefix for the built benchmark-node AMI.
image_name_prefix = "spider-storage-bench"


[results]
s3_uri = ""
s3_folder_name = "http2"
remote_data_dir = "/var/lib/spider-bench/data"
