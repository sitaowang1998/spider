[aws]
region = "us-east-1"
availability_zone = "us-east-1a"
run_id = "spider-bench-128"
# Set for LocalStack tests, for example "http://localhost:4566".
endpoint_url = ""

[benchmark]
node_counts = [1, 2, 4, 8, 16, 64, 128]
protocols = ["grpc", "rest"]
workloads = ["flat", "deep", "mixed"]
jobs_per_agent = 10
tasks_per_job = 1000
payload_bytes = 128
client_count = 8
worker_count = 16
flat_percent = 50

[instances]
client_count = 128
client_type = "c7i.large"
server_type = "c7i.16xlarge"
controller_type = "c7i.large"
# Optional override for the benchmark-node AMI. Leave as ami-xxxxxxxx to use
# .aws-bench/ami/latest.json written by build_ami.py.
ami_id = "ami-xxxxxxxx"
key_name = ""
iam_instance_profile = "spider-bench-ssm"
remote_root = "~/spider"
remote_workspace_root = ".aws-bench"

[database]
name = "spider_db"
username = "spider_user"
password = "replace-with-a-secret-password"
port = 3306
instance_class = "db.r7i.2xlarge"
allocated_storage = 200
storage_type = "gp3"
max_connections = 256

[network]
vpc_id = ""
vpc_cidr = "10.42.0.0/16"
subnet_id = ""
subnet_cidr = "10.42.1.0/24"
rds_subnet_ids = []
rds_subnet_availability_zones = ["us-east-1a", "us-east-1b"]
rds_subnet_cidrs = ["10.42.1.0/24", "10.42.2.0/24"]
security_group_id = ""
rds_security_group_id = ""
placement_group = "spider-storage-api-bench"

[artifact]
mode = "existing-repo"
# Optional exact S3 destination for the source bundle uploaded by build_ami.py.
s3_uri = ""
# Source OS AMI used only by build_ami.py. Amazon Linux 2023 with SSM agent is recommended.
base_ami_id = "ami-xxxxxxxx"
builder_instance_type = "c7i.large"
builder_iam_instance_profile = "spider-bench-ami-builder"
# Human-readable AWS image name prefix for the built benchmark-node AMI.
image_name_prefix = "spider-storage-api-bench"

[results]
# Recommended for controller-owned runs. Example:
# s3_uri = "s3://my-spider-bench-results/spider-bench-128"
s3_uri = ""
remote_data_dir = "data/aws-bench"
