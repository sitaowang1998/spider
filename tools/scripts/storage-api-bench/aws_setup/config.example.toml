[aws]
region = "us-east-1"
availability_zone = "us-east-1a"
run_id = "spider-bench-128"
# Set for LocalStack tests, for example "http://localhost:4566".
endpoint_url = ""

[benchmark]
node_counts = [1, 2, 4, 8, 16, 64, 128]
protocols = ["grpc", "rest"]
workloads = ["flat", "deep", "mixed"]
jobs_per_worker = 10
tasks_per_job = 1000
payload_bytes = 128
task_sleep_ms = 3
submitter_count = 8
worker_count = 16
worker_poll_wait_ms = 10
job_poll_wait_ms = 10
scheduler_poll_batch = 1024
scheduler_refill_interval_ms = 10
scheduler_poll_wait_ms = 20
flat_percent = 50

[instances]
worker_count = 128
worker_type = "c7i.large"
scheduler_type = "c7i.xlarge"
submitter_type = "c7i.xlarge"
server_type = "c7i.16xlarge"
controller_type = "c7i.large"
# Optional override for the benchmark-node AMI. Leave as ami-xxxxxxxx to use
# .aws-bench/ami/latest.json written by build_ami.py.
ami_id = "ami-xxxxxxxx"
key_name = ""
iam_instance_profile = "spider-bench-ssm"
remote_root = "/opt/spider"
remote_workspace_root = "/var/lib/spider-bench"

[database]
name = "spider_db"
username = "spider_user"
password = "replace-with-a-secret-password"
port = 3306
instance_class = "db.r7i.2xlarge"
allocated_storage = 200
storage_type = "gp3"
max_connections = 256
ssl_mode = "preferred"

[network]
vpc_id = ""
vpc_cidr = "10.42.0.0/16"
subnet_id = ""
subnet_cidr = "10.42.1.0/24"
rds_subnet_ids = []
# Leave empty to spread workers across rds_subnet_ids. Set explicitly to use
# a different worker subnet pool.
worker_subnet_ids = []
rds_subnet_availability_zones = ["us-east-1a", "us-east-1b"]
rds_subnet_cidrs = ["10.42.1.0/24", "10.42.2.0/24"]
security_group_id = ""
rds_security_group_id = ""
# Leave placement_group empty for large scale-out runs. Cluster placement groups
# improve node locality, but often cannot place 128+ instances in one AZ.
placement_group = ""
placement_strategy = "cluster"

[artifact]
mode = "existing-repo"
# Optional exact S3 destination for the source bundle uploaded by build_ami.py.
s3_uri = ""
# Source OS AMI used only by build_ami.py. Amazon Linux 2023 with SSM agent is recommended.
base_ami_id = "ami-xxxxxxxx"
builder_instance_type = "c7i.large"
builder_iam_instance_profile = "spider-bench-ami-builder"
# Human-readable AWS image name prefix for the built benchmark-node AMI.
image_name_prefix = "spider-storage-api-bench"

[results]
# Recommended for controller-owned runs. Example:
# s3_uri = "s3://my-spider-bench-results/spider-bench-128"
# If s3_uri is empty, provision.py creates/reuses the default results bucket and
# uploads under this folder. Leave empty to use aws.run_id.
s3_uri = ""
s3_folder_name = ""
remote_data_dir = "/var/lib/spider-bench/data"
