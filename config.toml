[server]
rest_bind = "10.1.0.3:8091"
grpc_bind = "10.1.0.3:50051"
rest_target = "http://10.1.0.3:8091"
grpc_target = "http://10.1.0.3:50051"

[database]
host = "127.0.0.1"
port = 3410
name = "spider-db"
username = "spider-user"
password = "spider-password"
max_connections = 32

[benchmark]
task_count = 4000
job_count = 40
payload_bytes = 128
client_count = 8
worker_count = 16
poll_batch = 64
poll_wait_ms = 10
warmup_sec = 5
duration_sec = 30
flat_percent = 50
output_dir = "data/baker-1"

[distributed]
agent_timeout_sec = 1800
poll_interval_ms = 1000

[[distributed.agents]]
id = "client-baker10"
url = "http://10.1.0.10:19091"

[[distributed.agents]]
id = "client-baker11"
url = "http://10.1.0.11:19091"

[[distributed.agents]]
id = "client-baker12"
url = "http://10.1.0.12:19091"

[[distributed.agents]]
id = "client-baker13"
url = "http://10.1.0.13:19091"
